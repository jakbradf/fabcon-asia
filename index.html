<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FABCON &amp; SQLCON APAC 2027 | Sydney | Microsoft Fabric + SQL Conference</title>

  <meta
    name="description"
    content="FABCON &amp; SQLCON APAC is the Asia-Pacific Microsoft Fabric and SQL community conference. ICC Sydney, 5–9 April 2027 — the first in a roving series across the region."
  />

  <meta property="og:title" content="FABCON &amp; SQLCON APAC 2027 – Sydney" />
  <meta
    property="og:description"
    content="The Asia-Pacific Microsoft Fabric and SQL community conference. ICC Sydney, April 2027."
  />
  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary_large_image" />

  <link rel="canonical" href="https://fabconapac.com/" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="alternate icon" type="image/png" href="assets/favicon.png" />
  <link rel="preload" as="image" href="assets/fabconbackground.jpg" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Teko:wght@400;600;700&display=swap" />

  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{margin:0;font-family:'Inter',Helvetica,Arial,sans-serif;color:#fff;background:#000}
    .page{position:relative;min-height:100vh;background-image:url(assets/fabconbackground.jpg);background-size:cover;background-position:center top;background-repeat:no-repeat;display:flex;align-items:center;justify-content:flex-start;padding:3rem 2rem}
    .page::before{content:'';position:absolute;inset:0;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);background:rgba(0,0,0,.65);z-index:0}
    .content{position:relative;z-index:1;max-width:560px}
    .sponsor{display:flex;align-items:center;gap:.6rem;margin-bottom:1.5rem}
    .sponsor-label{font-family:'Inter',sans-serif;font-size:.75rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.6)}
    .sponsor-logo{height:20px;width:auto;opacity:.9}
    .logo{width:min(72vw,380px);height:auto;display:block;margin-bottom:2rem}
    .coming-soon{font-family:'Teko',sans-serif;font-size:clamp(2.8rem,7vw,5rem);font-weight:700;line-height:1;letter-spacing:.02em;margin:0 0 1.25rem;color:#fff}
    .tagline{font-size:clamp(1rem,2vw,1.2rem);line-height:1.65;color:rgba(255,255,255,.8);margin:0 0 2rem;max-width:460px}
    .meta{font-family:'Teko',sans-serif;font-size:clamp(1.1rem,2.2vw,1.4rem);font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.7);margin:0}
    .accent-fabcon{color:#00b294}
    .accent-sqlcon{color:#1360a8}
  </style>
</head>
<body>
  <div class="page">
    <div class="content">

      <div class="sponsor">
        <span class="sponsor-label">Sponsored by</span>
        <img src="assets/microsoft-logo.png" alt="Microsoft" class="sponsor-logo" />
      </div>

      <object type="image/svg+xml" data="assets/logo-fabcon-sqlcon.svg" class="logo" aria-label="FABCON &amp; SQLCON"></object>

      <p class="coming-soon">Coming Soon</p>

      <p class="tagline">
        The world's largest Microsoft Fabric and SQL conference is coming to Asia-Pacific.
        ICC Sydney, April 2027 — the first stop in a roving APAC series.
      </p>

      <p class="meta">April 5–9, 2027 &nbsp;|&nbsp; ICC Sydney</p>

    </div>
  </div>
</body>
</html>
